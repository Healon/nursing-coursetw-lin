# 每週自動更新：爬來源 → 有變更才 commit → 全滅時亮紅。
# 步驟順序是刻意設計（詳見 docs/ARCHITECTURE.md）：
#   1. update.py 對「來源失敗」恆常 exit 0 → 頁面（含警示徽章）一定會被發布
#   2. diff-gated commit：有變更才 commit push，GitHub Pages 隨之自動重建
#   3. status.py --check 排在 commit 之後：全部來源失敗時讓 job 亮紅通知維護者，但不擋發布
name: update-events

on:
  schedule:
    - cron: "0 7 * * 0"  # 週日 07:00 UTC＝台北時間 15:00
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape sources and rebuild page
        run: python scripts/update.py

      - name: Commit and push if changed
        run: |
          if [ -n "$(git status --porcelain -- data index.html)" ]; then
            git config user.name "events-auto-update"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data index.html
            git commit -m "chore: weekly events update"
            git push
          else
            echo "No changes to publish."
          fi

      - name: Fail visibly when ALL sources are down
        run: python scripts/status.py --check
